$schema: https://json-schema.org/draft/2020-12/schema
$id: https://api.example.com/schemas/Meta.yml
title: Meta
type: object
description: The metadata for each response.
required:
- page
- totalPages
properties:
  page:
    type: integer
    description: The page represented in response.
    minLength: 1
    maxLength: 1000
  pageSize:
    type: integer
    minLength: 1
    maxLength: 1000
    description: The overall page size limits.
  totalPages:
    type: integer
    description: The total number of pages.
    minLength: 1
    maxLength: 1000
