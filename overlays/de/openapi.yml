- target: $.components.headers.RateLimit
  description: Dokumentation ins Deutsche übersetzen.
  update:
    description: Der RateLimit-Header kommuniziert die Kontingentrichtlinie. Der Wert enthält
      `limit` für das ablaufende Limit, `remaining` für das verbleibende Kontingent und `reset`
      für den Zeitpunkt, zu dem das Zeitfenster zurückgesetzt wird.
- target: $.components.headers.Retry-After
  description: Dokumentation ins Deutsche übersetzen.
  update:
    description: Der Retry-After-Header gibt an, wie lange der User-Agent warten soll, bevor
      er eine weitere Anfrage stellt. Der Wert wird in Sekunden angegeben und kann eine Ganzzahl
      oder ein zukünftiges Datum sein. Ist der Wert eine Ganzzahl, gibt er die Anzahl der
      zu wartenden Sekunden an. Ist der Wert ein Datum, gibt er den Zeitpunkt an, zu dem der
      User-Agent eine weitere Anfrage stellen kann.
- target: $.components.headers.Retry-After.examples.integer
  description: Dokumentation ins Deutsche übersetzen.
  update:
    summary: Nach 120 Sekunden erneut versuchen
- target: $.components.headers.Retry-After.examples.date
  description: Dokumentation ins Deutsche übersetzen.
