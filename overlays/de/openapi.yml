overlay: 1.1.0
info:
  title: Deutsches Overlay für Products API
  version: 0.1.0
  description: Deutsches OpenAPI Overlay für die API Evangelist Products API. Dieses Overlay
    übersetzt menschenlesbare Dokumentationsfelder, Beispiele und Fehlermeldungen, ohne die
    ursprüngliche OpenAPI-Beschreibung zu ändern.
extends: https://raw.githubusercontent.com/api-evangelist/products-api/main/openapi/products-api-openapi.yml
actions:
- target: $.info
  description: Dokumentation ins Deutsche übersetzen.
  update:
    title: Produkte-API
    description: Dies ist eine API-Vorlage für eine Produkte-API, die für Storytelling, Schulungen
      und Wissensdatenbanken verwendet werden kann.
    termsOfService: http://example.com/terms/
