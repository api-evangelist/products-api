overlay: 1.1.0
info:
  title: Overlay italiano per Products API
  version: 0.1.0
  description: Overlay OpenAPI italiano per l’API Products di API Evangelist. Questo overlay
    traduce i campi di documentazione rivolti alle persone, gli esempi e i messaggi di errore
    senza modificare la descrizione OpenAPI originale.
extends: https://raw.githubusercontent.com/api-evangelist/products-api/main/openapi/products-api-openapi.yml
actions:
- target: $.info
  description: Tradurre la documentazione in italiano.
  update:
    title: API Prodotti
    description: Questa è un modello di API per un’API di prodotti, pensato per storytelling,
      formazione e basi di conoscenza.
    termsOfService: http://example.com/terms/
- target: $.externalDocs
  description: Tradurre la documentazione in italiano.
  update:
    description: Pagina principale dell’API Prodotti
- target: $.servers[0]
  description: Tradurre la documentazione in italiano.
  update:
    description: Produzione
- target: $.tags[?(@.name == 'Products')]
  description: Tradurre la documentazione in italiano.
  update:
    description: Pubblicare e gestire prodotti.
- target: $.paths['/products'].get
  description: Tradurre la documentazione in italiano.
  update:
    summary: Recupera prodotti
    description: Restituisce l’elenco di tutti i prodotti per l’utente autenticato.
- target: $.paths['/products'].get.responses['200']
  description: Tradurre la documentazione in italiano.
  update:
    description: Un elenco di prodotti
- target: $.paths['/products'].post
  description: Tradurre la documentazione in italiano.
  update:
    summary: Crea un prodotto
    description: Crea un nuovo prodotto.
- target: $.paths['/products'].post.responses['201']
  description: Tradurre la documentazione in italiano.
  update:
    description: Prodotto creato correttamente
- target: $.paths['/products/{productId}'].get
  description: Tradurre la documentazione in italiano.
  update:
    summary: Recupera un prodotto
    description: Restituisce i dettagli di uno specifico prodotto.
- target: $.paths['/products/{productId}'].get.responses['200']
  description: Tradurre la documentazione in italiano.
  update:
    description: Dettagli del prodotto
- target: $.paths['/products/{productId}'].put
  description: Tradurre la documentazione in italiano.
  update:
    summary: Aggiorna un prodotto
    description: Aggiorna un prodotto.
- target: $.paths['/products/{productId}'].put.responses['204']
  description: Tradurre la documentazione in italiano.
  update:
    description: Prodotto aggiornato
- target: $.paths['/products/{productId}'].delete
  description: Tradurre la documentazione in italiano.
  update:
    summary: Elimina un prodotto
    description: Elimina un prodotto.
- target: $.paths['/products/{productId}'].delete.responses['204']
  description: Tradurre la documentazione in italiano.
  update:
    description: Prodotto eliminato
- target: $.paths['/products/{productId}/cancle'].put
  description: Tradurre la documentazione in italiano.
  update:
    summary: Annulla un prodotto
    description: Annulla un prodotto.
- target: $.paths['/products/{productId}/cancle'].put.responses['204']
  description: Tradurre la documentazione in italiano.
  update:
    description: Prodotto annullato
- target: $.components.parameters.ProductId
  description: Tradurre la documentazione in italiano.
  update:
    description: L’identificatore del prodotto da recuperare.
- target: $.components.schemas.WrapperResponseCollection
  description: Tradurre la documentazione in italiano.
  update:
    description: Un contenitore generico di richiesta/risposta che include sia dati sia link.
      I link fungono da controlli ipermediali (HATEOAS).
- target: $.components.schemas.WrapperResponseCollection.properties.data
  description: Tradurre la documentazione in italiano.
  update:
    description: Il contenitore di una raccolta è un array di oggetti.
- target: $.components.schemas.WrapperResponseObject
  description: Tradurre la documentazione in italiano.
  update:
    description: Un contenitore generico di richiesta/risposta che include sia dati sia link.
      I link fungono da controlli ipermediali (HATEOAS).
