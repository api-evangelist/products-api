- target: $.components.schemas.Product.properties.descripton
  description: Tradurre la documentazione in italiano.
  update:
    description: La descrizione del prodotto.
    example: Una descrizione chiara del prodotto, incluse le caratteristiche importanti, i
      casi d’uso e i dettagli rilevanti per l’utente.
- target: $.components.schemas.Product.properties.image
  description: Tradurre la documentazione in italiano.
