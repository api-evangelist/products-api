- target: $.components.headers.RateLimit
  description: Tradurre la documentazione in italiano.
  update:
    description: L’header RateLimit comunica la politica di quota. Il valore contiene `limit`
      per il limite in scadenza, `remaining` per la quota rimanente e `reset` per il momento
      in cui la finestra temporale viene reimpostata.
- target: $.components.headers.Retry-After
  description: Tradurre la documentazione in italiano.
  update:
    description: L’header Retry-After indica per quanto tempo lo user agent deve attendere
      prima di effettuare una richiesta successiva. Il valore è espresso in secondi e può
      essere un intero o una data futura. Se il valore è un intero, indica il numero di secondi
      da attendere. Se il valore è una data, indica il momento in cui lo user agent può effettuare
      una richiesta successiva.
- target: $.components.headers.Retry-After.examples.integer
  description: Tradurre la documentazione in italiano.
  update:
    summary: Riprova dopo 120 secondi
- target: $.components.headers.Retry-After.examples.date
  description: Tradurre la documentazione in italiano.
  update:
    summary: Riprova dopo la data indicata
