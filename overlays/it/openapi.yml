- target: $.components.schemas.Problem.properties.title
  description: Tradurre la documentazione in italiano.
  update:
    description: Un breve riepilogo leggibile da una persona del tipo di problema.
    example: Il credito disponibile non è sufficiente.
- target: $.components.schemas.Problem.properties.detail
  description: Tradurre la documentazione in italiano.
  update:
    description: Una spiegazione leggibile da una persona specifica per questo evento.
    example: Il saldo attuale è 30, ma sono necessari 50.
- target: $.components.schemas.Problem.properties.instance
  description: Tradurre la documentazione in italiano.
  update:
    description: Un riferimento URI che identifica lo specifico evento del problema.
- target: $.components.schemas.Problem.properties.status
  description: Tradurre la documentazione in italiano.
  update:
